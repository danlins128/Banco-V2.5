<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Daniel's Bank</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <header class="grid grid-cols-3 items-center m-1 ">
    <img  class="h-18 w-16" src="/static/Logobank.png" alt="Icone do usuário"> 
    <h2 class="flex justify-center text-3xl">LinsBank</h2>
  </header>
  <hr>
  <div class="flex-auto">
    <div class="flex-auto">
      <section class="m-2">
         <h3 class="text-4xl">Olá, {{session["nome"]}}</h3>
        <p class="text-1xl">Sua conta: {{session["conta"]}}</p>
        <p class="mt-4">O que gostaria de fazer hoje?</p>
      </section>
  
      <div class="flex justify-center mx-2">
        <div class="border-2 border-black rounded-2xl min-w-full p-4 text-left">
        <h3 class="font-medium">Saldo:</h3>
        <p class="font-bold text-4xl">R$ {{session["saldo"] | dinheiro}}</p>
        </div>
      </div>
      <nav class="grid grid-cols-3 gap-4 mt-6 p-4">
        <div class=" flex flex-col items-center justify-center border-2 border-black rounded-2xl p-4 aspect-square">
          <img class="object-contain"src="/static/depositar.png">
          <button>Depositar</button>
        </div>
        <div class="flex flex-col items-center justify-center border-2 border-black rounded-2xl p-4 aspect-square">
          <img class="object-contain"src="/static/saque.png">
          <button>Sacar</button>
        </div>
        <div class="flex flex-col items-center justify-center border-2 border-black rounded-2xl p-4 aspect-square">
          <img class="object-contain"src="/static/transferir.png">
          <button>Transferir</button>
        </div>
        <div class="flex flex-col items-center justify-center border-2 border-black rounded-2xl p-5 aspect-square">
          <img class="object-contain"src="/static/extrato.png">
          <button>Extrato</button>
        </div>
        <div class="flex flex-col items-center justify-center border-2 border-black rounded-2xl p-4 aspect-square">
          <img class="object-contain"src="/static/pagamento.png">
          <button>Pagamentos</button>
        </div>
        <div class="flex flex-col items-center justify-center border-2 border-black rounded-2xl p-4 aspect-square">
          <img class="object-contain"src="/static/cartao.png">
          <button>Cartões</button>
        </div>
      </nav>
    </div>
  </div>
  <footer>
    <div class="relative rounded-3xl text-center text-red-600 mt-8 mx-3 shadow-lg p-4 bg-red-300 hover:bg-red-200">
    <a class="absolute inset-0 z-10"href="/logout"></a>
    <span>Sair</span>
    </div>
  </footer>

</body>
</html>
