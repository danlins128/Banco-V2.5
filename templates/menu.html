<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Daniel's Bank</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!--<script src="https://cdn.tailwindcss.com"></script>-->
<style>
  /* O container que trava na tela toda */
  .modal-fixo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    z-index: 9999;
  }

  /* A folha branca que sobe */
  .folha-menu {
    background: white;
    width: 100%;
    height: 60%;
    border-radius: 30px 30px 0 0;
    padding: 2rem;
    box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
    transform: translateY(100%); /* Começa fora da tela */
    animation: subir 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes subir {
    to { transform: translateY(0); }
  }

  .fundo-escuro {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
  }
</style>

  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

</head>
<body class="flex flex-col justify-center items-center bg-gray-50">
  <div class="w-full max-w-md border rounded-lg bg-white shadow-lg p-6">
  <header class="grid grid-cols-3 items-center m-1 ">
    <img  class="h-18 w-16" src="/static/Logobank.png" alt="Icone do usuário"> 
    <h2 class="flex justify-center text-3xl">LinsBank</h2>
  </header>
  <hr>
  <div class="flex-auto">
    <div class="flex-auto">
      <section class="m-2">
         <h3 class="text-4xl">Olá, {{session["nome"]}}</h3>
        <p class="text-1xl">Sua conta: {{session["conta"]}}</p>
        <p class="mt-4">O que gostaria de fazer hoje?</p>
      </section>
  
      <div 
        id="saldo" 
        hx-get="/saldo" 
        hx-trigger="load, atualizarSaldo from:body"
        hx-swap="innerHTML"
        class="flex justify-center mx-2">
        <div class="border-2 border-black rounded-2xl min-w-full p-4 bg-gradient-to-b from-purple-400 to-purple-600 text-left text-white">
            <p class="animate-bounce pt-4">Carregando...</p>
        </div>
      </div>
      
      <nav class="grid grid-cols-3 gap-4 mt-6 p-4">
        <div class=" flex flex-col items-center justify-center border-2 border-black rounded-2xl p-4 aspect-square">
          <button 
            hx-get="/menu/deposito"
            hx-target="#conteudo_dinamico"
            hx-swap="innerHTML"
            class="w-full h-full active:scale-90 hover:scale-105 transition-transform">
            <img class="object-contain"src="/static/depositar.png"><span>Depositar</span></button>
        </div>
        <div class="flex flex-col items-center justify-center border-2 border-black rounded-2xl p-4 aspect-square">
          <button 
            hx-get="/menu/saque"
            hx-target="#conteudo_dinamico"
            hx-swap="innerHTML"
            class="w-full h-full active:scale-90 hover:scale-105 transition-transform"><img class="object-contain"src="/static/saque.png"><span>Sacar</span></button>
        </div>
        <div class="flex flex-col items-center justify-center border-2 border-black rounded-2xl p-5 aspect-square">
          <button class="w-full h-full active:scale-90 hover:scale-105 transition-transform"><img class="object-contain"src="/static/transferir.png"><span>Transferir</span></button>
        </div>
        <div class="flex flex-col items-center justify-center border-2 border-black rounded-2xl p-5 aspect-square">
          <button class="w-full h-full active:scale-90 hover:scale-105  transition-transform"><img class="object-contain w-16 p-2"src="/static/extrato.png"><span>Extrato</span></button>
        </div>
        <div class="flex flex-col items-center  border-2 border-black rounded-2xl p-5 aspect-square">
          <button class="w-full h-full active:scale-90 hover:scale-105 transition-transform"><img class="object-contain w-16 p-2"src="/static/pagamento.png"><span>Pagamentos</span></button>
        </div>
        <div class="flex flex-col items-center justify-center border-2 border-black rounded-2xl p-5 aspect-square">
          <button class="w-full h-full active:scale-90 hover:scale-105 transition-transform">   <img class="object-contain w-16 p-2"src="/static/cartao.png"><span>Cartões</span></button>
        </div>
      </nav>
    </div>
  </div>
  <footer>
    <div class="relative rounded-3xl text-center text-red-600 mt-8 mx-3 shadow-lg p-4 bg-red-300 hover:bg-red-200">
    <a class="absolute inset-0 z-10"href="/logout"></a>
    <span>Sair</span>
    </div>
  </footer>
<div id="conteudo_dinamico" class="w-full -max-w-md justify-center items-center">
        <!-- div para sub menu-->
</div>
</div>
</body>
</html>
