<div class="modal-fixo">
<div class="fundo-escuro" onclick="this.parentElement.remove()"></div>
<div class="folha-menu">
<div class="w-12 h-1 bg-gray-200 mx-auto rounded mb-8"></div>
<h2 class="text-3xl font-bold text-gray-800 mb-8">Saque</h2>
<form 
hx-post="/saque"
hx-target="#conteudo_dinamico"
hx-swap="innerHTML"
class="flex flex-col"
action="/sacar"
method="POST">
<label class="text-gray-400 text-xs font-bold uppercase">Valor</label>
<input
type="number"
name="valor"
placeholder="R$ 0,00"
class="w-full border-b p-3 text-4xl py-2 font-bold text-gray-500 outline-none">

<button type="submit"class="bg-purple-600 text-white p-3 rounded-xl m-4">
Confirmar saque
</button>
</form>
<button onclick="this.closest('.modal-fixo').remove()" class="mt-4 text-gray-500 text-lg bg-gray-50 rounded-lg py-2 px-4">
Voltar
</button>
</div>
</div>
