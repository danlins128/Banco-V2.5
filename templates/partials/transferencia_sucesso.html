{% extends 'base.html' %}

{%block content%}

<div class="modal-fixo flex flex-col h-screen items-center justify-center">        
      <div class="bg-white shadow-lg rounded-3xl p-4">
          <h2 class="text-3xl font-bold text-gray-800 mb-8 justify-center text-center">Transferência realizada com sucesso
          </h2>
          <div class="w-full mb-8 grid row justify-center items-center transition-transform animate-bounce">
            <img class="size-24 mt-2" src="/static/true-check.png" alt="Transferência Sucesso">
          </div>
          <p class="text-2xl text-center font-bold m-4">Valor: R$ {{valor}}</p>
          <div class="flex gap-8">
          <a
          href="/menu"
          class="bg-purple-600 text-white p-3 rounded-xl m-4 w-full active:scale-80 transition-transform hover:bg-purple-800 text-center text-2xl"
          >
          Voltar
          </a>
          </div>
      </div>
</div>
{%endblock%}
