<div id="modal-deposito" class="modal-fixo flex items-center justify-center">
    <div class="fundo-escuro" onclick="document.getElementById('modal-deposito').remove()"></div>

    <div class="folha-menu max-w-md w-full flex flex-col justify-center items-center">
        <div class="w-12 h-1 bg-gray-200 mx-auto rounded mb-8"></div>
        
        <h2 class="text-3xl font-bold text-gray-800 mb-6">Depósito</h2>
        
<form 
hx-post="/deposito"
hx-target="#conteudo_dinamico"
hx-swap="innerHTML"
class="flex flex-col">
<label class="text-gray-400 text-xs font-bold uppercase">Valor</label>
<input
type="number"
name="valor"
placeholder="R$ 0,00"
class="w-full border-b p-3 text-4xl py-2 font-bold text-gray-500 outline-none">
<button 
hx-target="#conteudo_dinamico" 
hx-swap="innerHTML"
hx-disabled-elt="this"
hx-indicator="#loading"
type="submit"class="bg-purple-600 text-white p-3 rounded-xl m-4 active:scale-80 transition-transform hover:bg-purple-800">
Confirmar Depósito
</button>
</form>
<button onclick="document.getElementById('modal-deposito').remove()" class="w-full text-gray-400 mt-6 font-bold uppercase text-xs tracking-widest active:scale-95 transition-transform">
            Voltar
        </button>
    </div>
</div>
